<div class="modal fade" id="{{_modalId}}" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h5 class="modal-title">Chọn tệp / thư mục</h5>
        <button type="button" class="close" ng-click="close()"><span>&times;</span></button>
      </div>

      <div class="modal-body p-0">
        <!-- NHÚNG UI DÙNG CHUNG -->
        <div ng-include="contentTplPath"></div>
      </div>

      <div class="modal-footer py-2">
        <div class="mr-auto text-muted">Đã chọn: <b>{{ngModel.length}}</b></div>
        <button class="btn btn-light btn-sm" ng-click="close()">Đóng</button>
        <button class="btn btn-primary btn-sm" ng-click="confirm()">Xác nhận</button>
      </div>
    </div>
  </div>
</div>
